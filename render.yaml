services:
  - type: web
    name: tanzania-cars-marketplace
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn tanzania_car_marketplace.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: tanzania-car-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: tanzania-car-db
    databaseName: tanzania_car_db
    user: tanzania_user
    plan: free