{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-chart-line"></i> Free Car Valuation</h4>
                    <p class="mb-0">Get instant market value for your car</p>
                </div>
                <div class="card-body">
                    <form method="post" id="valuationForm">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>Make</label>
                            <select name="make" class="form-control" required>
                                <option value="">Select Make</option>
                                <option value="Toyota">Toyota</option>
                                <option value="Honda">Honda</option>
                                <option value="Nissan">Nissan</option>
                                <option value="BMW">BMW</option>
                                <option value="Mercedes">Mercedes</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Model</label>
                            <input type="text" name="model" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Year</label>
                            <input type="number" name="year" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Mileage (km)</label>
                            <input type="number" name="mileage" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Condition</label>
                            <select name="condition" class="form-control">
                                <option value="excellent">Excellent</option>
                                <option value="good">Good</option>
                                <option value="fair">Fair</option>
                                <option value="poor">Poor</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Get Valuation</button>
                    </form>
                    
                    {% if result %}
                    <div class="mt-4 text-center p-3 bg-info text-white rounded">
                        <h5>Estimated Value:</h5>
                        <h2>TZS {{ result.value }}</h2>
                        <p class="mb-0">For your {{ result.make }} {{ result.model }}</p>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
