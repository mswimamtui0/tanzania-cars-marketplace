{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}
{% get_available_languages as LANGUAGES %}

<div class="language-switcher">
    <div class="btn-group" role="group">
        <button type="button" class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false" style="border-radius: 20px;">
            {% if LANGUAGE_CODE == 'sw' %}
                🇹🇿
            {% else %}
                🇬🇧
            {% endif %}
            <span class="ms-1">{% if LANGUAGE_CODE == 'sw' %}SW{% else %}EN{% endif %}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            {% for language_code, language_name in LANGUAGES %}
                <li>
                    <form action="{% url 'set_language' %}" method="post" style="display: inline;">
                        {% csrf_token %}
                        <input name="next" type="hidden" value="{{ request.get_full_path }}" />
                        <input name="language" type="hidden" value="{{ language_code }}" />
                        <button type="submit" class="dropdown-item {% if language_code == LANGUAGE_CODE %}active{% endif %}">
                            {% if language_code == 'en' %}🇬🇧{% else %}🇹🇿{% endif %}
                            {{ language_name }}
                        </button>
                    </form>
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
