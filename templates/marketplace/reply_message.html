{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-reply"></i> Reply to {{ original_message.sender.username }}</h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <strong>Original Message:</strong><br>
                        <em>{{ original_message.subject }}</em><br>
                        <small>{{ original_message.content|truncatechars:100 }}</small>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>Subject</label>
                            <input type="text" name="subject" class="form-control" value="RE: {{ original_message.subject }}" required>
                        </div>
                        <div class="mb-3">
                            <label>Message</label>
                            <textarea name="content" rows="5" class="form-control" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send Reply</button>
                        <a href="{% url 'message_detail' original_message.id %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
