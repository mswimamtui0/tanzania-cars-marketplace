{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-info text-white">
                    <h4 class="mb-0"><i class="fas fa-tools"></i> Request Inspection</h4>
                </div>
                <div class="card-body">
                    <h5>{{ car.year }} {{ car.make }} {{ car.model }}</h5>
                    <p class="text-success fw-bold">TSh {{ car.price|floatformat:0 }}</p>
                    <hr>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>Preferred Inspection Date</label>
                            <input type="datetime-local" name="inspection_date" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Location</label>
                            <input type="text" name="location" class="form-control" placeholder="Where should we inspect the car?" required>
                        </div>
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i> Inspection fee: <strong>TSh 50,000</strong>
                        </div>
                        <button type="submit" class="btn btn-info w-100">Request Inspection</button>
                        <a href="{% url 'car_detail' car.id %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
