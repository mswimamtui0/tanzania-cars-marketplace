{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning">
                    <h4 class="mb-0">Assign Yard Manager</h4>
                </div>
                <div class="card-body">
                    <form method="post" action="{% url 'admin_assign_yard' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>Select Yard</label>
                            <select name="yard_id" class="form-control" required>
                                <option value="">-- Select a Yard --</option>
                                {% for yard in yards %}
                                    <option value="{{ yard.id }}">{{ yard.name }} - {{ yard.location }}</option>
                                {% empty %}
                                    <option value="">No yards available</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Select Yard Manager</label>
                            <select name="manager_id" class="form-control" required>
                                <option value="">-- Select a Manager --</option>
                                {% for manager in managers %}
                                    <option value="{{ manager.id }}">{{ manager.username }} ({{ manager.email }})</option>
                                {% empty %}
                                    <option value="">No yard managers available</option>
                                {% endfor %}
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Assign Manager</button>
                        <a href="{% url 'admin_verify_yard' %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
