{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="fas fa-flag"></i> Report Fake Listing</h4>
                </div>
                <div class="card-body">
                    <h5>{{ car.year }} {{ car.make }} {{ car.model }}</h5>
                    <p class="text-muted">Price: TSh {{ car.price|floatformat:0 }}</p>
                    <hr>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>Reason for Report</label>
                            <select name="reason" class="form-control" required>
                                <option value="fake_car">Fake/Non-existent car</option>
                                <option value="wrong_price">Misleading price</option>
                                <option value="stolen_car">Suspected stolen vehicle</option>
                                <option value="scam">Scam attempt</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Description</label>
                            <textarea name="description" rows="5" class="form-control" 
                                      placeholder="Please provide details about why you think this listing is fake..." required></textarea>
                        </div>
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i> Our team will investigate this report within 24 hours.
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Submit Report</button>
                        <a href="{% url 'car_detail' car.id %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
