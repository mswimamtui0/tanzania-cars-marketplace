{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3><i class="fas fa-sign-in-alt"></i> Login</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    <hr>
                    <div class="text-center">
                        <a href="{% url 'register' %}">Don't have an account? Register</a>
                    </div>
                </div>
            </div>
            
            <!-- Demo Accounts -->
            <div class="card mt-3">
                <div class="card-body text-center">
                    <small class="text-muted">Demo Accounts:</small><br>
                    <span class="badge bg-danger">Admin: admin/admin123</span>
                    <span class="badge bg-success">Dealer: dealer1/dealer123</span>
                    <span class="badge bg-info">Yard Manager: yardmanager/yard123</span>
                    <span class="badge bg-secondary">Buyer: buyer1/buyer123</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
